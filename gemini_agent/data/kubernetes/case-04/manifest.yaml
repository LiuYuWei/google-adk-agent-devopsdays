apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-worker
  namespace: shopnow
  labels:
    app: email-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: email-worker
  template:
    metadata:
      labels:
        app: email-worker
    spec:
      containers:
        - name: email-worker
          image: gcr.io/shopnow-prod/email-worker:1.2.0
          ports:
            - containerPort: 8083
          env:
            - name: APP_ENV
              value: "production"
            - name: SMTP_HOST
              value: "smtp.shopnow.internal"
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: password
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
