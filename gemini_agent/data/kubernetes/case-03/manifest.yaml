apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-engine
  namespace: shopnow
  labels:
    app: recommendation-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recommendation-engine
  template:
    metadata:
      labels:
        app: recommendation-engine
    spec:
      serviceAccountName: recommendation-engine-sa
      containers:
        - name: recommendation-engine
          image: gcr.io/shopnow-prod/recommendation-engine:2.3.1
          ports:
            - containerPort: 8082
          env:
            - name: APP_ENV
              value: "production"
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx480m"
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
