apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: shopnow
  labels:
    app: payment-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-api
  template:
    metadata:
      labels:
        app: payment-api
    spec:
      serviceAccountName: payment-api-sa
      containers:
        - name: payment-api
          image: gcr.io/shopnow-prod/payment-api:1.4.2
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: "production"
            - name: REDIS_URL
              value: "redis://redis-master:6379"
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
